<!-- @dsCard group="Colors" viewport="700x170" subtitle="[data-theme=dark] swatches" name="Dark Mode" -->
<!DOCTYPE html>
<html lang="he" dir="rtl" data-theme="dark"><head><meta charset="utf-8"><title>Design System – Colors (Dark)</title><link rel="stylesheet" href="../styles.css"></head>
<body style="background:var(--bg); padding:20px; display:flex; gap:12px;">
  <div style="flex:1; border-radius:12px; background:var(--surface); border:1px solid var(--border); padding:12px; font-size:12px; font-weight:600; color:var(--text-muted); display:flex; align-items:flex-end;">--surface</div>
  <div style="flex:1; border-radius:12px; background:var(--surface-2); padding:12px; font-size:12px; font-weight:600; color:var(--text-muted); display:flex; align-items:flex-end;">--surface-2</div>
  <div style="flex:1; border-radius:12px; background:var(--primary); color:#fff; padding:12px; font-size:12px; font-weight:600; display:flex; align-items:flex-end;">--primary</div>
  <div style="flex:1; border-radius:12px; background:var(--primary-soft); color:var(--primary-soft-text); padding:12px; font-size:12px; font-weight:600; display:flex; align-items:flex-end;">--primary-soft</div>
  <div style="flex:1; border-radius:12px; background:var(--gold-soft); color:var(--gold-text); padding:12px; font-size:12px; font-weight:600; display:flex; align-items:flex-end;">--gold-soft</div>
  <div style="flex:1; border-radius:12px; background:var(--surface); border:1px solid var(--border); padding:12px; font-size:14px; font-weight:600; color:var(--text); display:flex; align-items:flex-end;">טקסט</div>
</body></html>
