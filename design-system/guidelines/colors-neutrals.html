<!-- @dsCard group="Colors" viewport="700x150" subtitle="Surfaces, borders, text" name="Neutrals" -->
<!DOCTYPE html>
<html lang="he" dir="rtl"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css"></head>
<body style="background:var(--bg); padding:20px; display:flex; gap:12px;">
  <div style="flex:1; border-radius:12px; background:var(--bg); border:1px solid var(--border-strong); padding:12px; font-size:12px; font-weight:600; color:var(--text-muted); display:flex; align-items:flex-end;">--bg</div>
  <div style="flex:1; border-radius:12px; background:var(--surface); border:1px solid var(--border); padding:12px; font-size:12px; font-weight:600; color:var(--text-muted); display:flex; align-items:flex-end;">--surface</div>
  <div style="flex:1; border-radius:12px; background:var(--surface-2); padding:12px; font-size:12px; font-weight:600; color:var(--text-muted); display:flex; align-items:flex-end;">--surface-2</div>
  <div style="flex:1; border-radius:12px; background:var(--surface-3); padding:12px; font-size:12px; font-weight:600; color:var(--text-muted); display:flex; align-items:flex-end;">--surface-3</div>
  <div style="flex:1; border-radius:12px; background:var(--text); color:var(--bg); padding:12px; font-size:12px; font-weight:600; display:flex; align-items:flex-end;">--text</div>
  <div style="flex:1; border-radius:12px; background:var(--text-muted); color:var(--bg); padding:12px; font-size:12px; font-weight:600; display:flex; align-items:flex-end;">--text-muted</div>
</body></html>
