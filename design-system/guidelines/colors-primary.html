<!DOCTYPE html>
<html lang="he" dir="rtl"><head><meta charset="utf-8"><title>Design System – Colors (Primary)</title><link rel="stylesheet" href="../styles.css"></head>
<body style="background:var(--bg); padding:20px; display:flex; gap:12px; align-items:stretch;">
  <div style="flex:1; border-radius:12px; background:var(--primary); color:#fff; padding:12px; font-size:12px; font-weight:600; display:flex; align-items:flex-end;">--primary</div>
  <div style="flex:1; border-radius:12px; background:var(--primary-hover); color:#fff; padding:12px; font-size:12px; font-weight:600; display:flex; align-items:flex-end;">--primary-hover</div>
  <div style="flex:1; border-radius:12px; background:var(--primary-deep); color:#fff; padding:12px; font-size:12px; font-weight:600; display:flex; align-items:flex-end;">--primary-deep</div>
  <div style="flex:1; border-radius:12px; background:var(--primary-soft); color:var(--primary-soft-text); padding:12px; font-size:12px; font-weight:600; display:flex; align-items:flex-end;">--primary-soft</div>
</body></html>
