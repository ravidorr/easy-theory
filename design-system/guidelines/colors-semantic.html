<!DOCTYPE html>
<html lang="he" dir="rtl"><head><meta charset="utf-8"><title>Design System – Colors (Semantic)</title><link rel="stylesheet" href="../styles.css"></head>
<body style="background:var(--bg); padding:20px; display:flex; gap:12px;">
  <div style="flex:1; display:flex; flex-direction:column; gap:8px;">
    <div style="height:56px; border-radius:12px; background:var(--gold);"></div>
    <div style="height:34px; border-radius:10px; background:var(--gold-soft); color:var(--gold-text); font-size:12px; font-weight:600; display:flex; align-items:center; justify-content:center;">--gold · הישגים</div>
  </div>
  <div style="flex:1; display:flex; flex-direction:column; gap:8px;">
    <div style="height:56px; border-radius:12px; background:var(--success);"></div>
    <div style="height:34px; border-radius:10px; background:var(--success-soft); color:var(--success-text); font-size:12px; font-weight:600; display:flex; align-items:center; justify-content:center;">--success · תשובה נכונה</div>
  </div>
  <div style="flex:1; display:flex; flex-direction:column; gap:8px;">
    <div style="height:56px; border-radius:12px; background:var(--danger);"></div>
    <div style="height:34px; border-radius:10px; background:var(--danger-soft); color:var(--danger-text); font-size:12px; font-weight:600; display:flex; align-items:center; justify-content:center;">--danger · טעות</div>
  </div>
</body></html>
