<!-- @dsCard group="Type" viewport="700x210" subtitle="Body, small, caption + voice example" name="Body & Voice" -->
<!DOCTYPE html>
<html lang="he" dir="rtl"><head><meta charset="utf-8"><title>Design System – Typography (Body)</title><link rel="stylesheet" href="../styles.css"></head>
<body style="background:var(--bg); padding:24px; display:flex; flex-direction:column; gap:12px;">
  <div style="display:flex; align-items:baseline; gap:16px;">
    <span style="font-size:var(--type-body-size); line-height:var(--line-body); max-width:440px;">בכניסה למעגל תנועה, תני זכות קדימה לרכב שכבר נמצא בתוך המעגל.</span>
    <span style="font-size:11px; color:var(--text-faint); font-family:monospace;">body 16/400</span>
  </div>
  <div style="display:flex; align-items:baseline; gap:16px;">
    <span style="font-size:var(--type-small-size); color:var(--text-muted);">3 מתוך 8, את באמצע!</span>
    <span style="font-size:11px; color:var(--text-faint); font-family:monospace;">small 13.5</span>
  </div>
  <div style="display:flex; align-items:baseline; gap:16px;">
    <span style="font-size:var(--type-caption-size); font-weight:var(--type-caption-weight); color:var(--text-faint);">~20 דק׳ · 8 שאלות</span>
    <span style="font-size:11px; color:var(--text-faint); font-family:monospace;">caption 12/600</span>
  </div>
  <div style="font-size:12px; color:var(--text-faint); border-top:1px solid var(--border); padding-top:10px;">פנייה בלשון נקבה, בלי קו מפריד ארוך, אימוג׳י במשורה בלבד.</div>
</body></html>
