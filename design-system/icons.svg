<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">

  <!-- 16×16 fill icons -->
  <symbol id="icon-flame" viewBox="0 0 16 16">
    <path d="M8 1.5c.4 2.2 3.1 3.4 3.9 5.8.9 2.7-.8 6-3.9 6s-4.8-3.3-3.9-6c.4-1.3 1.4-2.2 2.2-3.2.8-1 1.5-1.7 1.7-2.6z" fill="currentColor"/>
    <circle cx="8" cy="10.6" r="2.1" fill="var(--surface)" opacity="0.85"/>
  </symbol>

  <symbol id="icon-flame-gold" viewBox="0 0 16 16">
    <path d="M8 1.5c.4 2.2 3.1 3.4 3.9 5.8.9 2.7-.8 6-3.9 6s-4.8-3.3-3.9-6c.4-1.3 1.4-2.2 2.2-3.2.8-1 1.5-1.7 1.7-2.6z" fill="currentColor"/>
    <circle cx="8" cy="10.6" r="2.1" fill="var(--gold-soft)" opacity="0.85"/>
  </symbol>

  <symbol id="icon-star" viewBox="0 0 16 16">
    <path d="M8 1.2l2 4.2 4.6.6-3.4 3.2.9 4.6L8 11.6l-4.1 2.2.9-4.6L1.4 6l4.6-.6z" fill="currentColor"/>
  </symbol>

  <symbol id="icon-gem" viewBox="0 0 16 16">
    <path d="M4.5 2.5h7L14 6 8 13.5 2 6z" fill="currentColor"/>
    <path d="M5.2 6.5h5.6L8 10.9z" fill="var(--surface)" opacity="0.85"/>
  </symbol>

  <symbol id="icon-trophy" viewBox="0 0 16 16">
    <path d="M4.5 1.8h7v4a3.5 3.5 0 0 1-7 0z" fill="currentColor"/>
    <path d="M4.5 3H2.5v1.5A2.5 2.5 0 0 0 5 7M11.5 3h2v1.5A2.5 2.5 0 0 1 11 7" fill="none" stroke="currentColor" stroke-width="1.3"/>
    <path d="M7 9.3h2v2.2H7z" fill="currentColor"/>
    <path d="M4.8 11.5h6.4v1.7H4.8z" fill="currentColor"/>
  </symbol>

  <!-- 24×24 stroke icons -->
  <symbol id="icon-home" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 10.5 12 3l9 7.5"/>
      <path d="M5 9.5V21h14V9.5"/>
    </g>
  </symbol>

  <symbol id="icon-book" viewBox="0 0 24 24">
    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20V3H6.5A2.5 2.5 0 0 0 4 5.5z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <symbol id="icon-cards" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="8" y="8" width="12" height="12" rx="2"/>
      <path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"/>
    </g>
  </symbol>

  <symbol id="icon-more" viewBox="0 0 24 24">
    <circle cx="5" cy="12" r="1.6" fill="currentColor"/>
    <circle cx="12" cy="12" r="1.6" fill="currentColor"/>
    <circle cx="19" cy="12" r="1.6" fill="currentColor"/>
  </symbol>

  <symbol id="icon-timer" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="14" r="8"/>
      <path d="M10 2h4"/>
      <path d="M12 14l3-3"/>
    </g>
  </symbol>

  <symbol id="icon-calendar" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="17" rx="3"/>
      <path d="M8 2v4M16 2v4M3 9h18"/>
    </g>
  </symbol>

  <symbol id="icon-video" viewBox="0 0 24 24">
    <rect x="2" y="5" width="20" height="14" rx="3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="m14 12-4-2.5v5z" fill="currentColor" stroke="none"/>
  </symbol>

  <symbol id="icon-link" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10 13a5 5 0 0 0 7.5.5l3-3a5 5 0 0 0-7-7l-1.7 1.7"/>
      <path d="M14 11a5 5 0 0 0-7.5-.5l-3 3a5 5 0 0 0 7 7l1.7-1.7"/>
    </g>
  </symbol>

  <symbol id="icon-moon" viewBox="0 0 24 24">
    <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <symbol id="icon-heart" viewBox="0 0 24 24">
    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <symbol id="icon-globe" viewBox="0 0 24 24">
    <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
    </g>
  </symbol>

  <!-- 24×24 faint-color icons -->
  <symbol id="icon-chevron-left" viewBox="0 0 24 24">
    <path d="m15 18-6-6 6-6" fill="none" stroke="var(--text-faint)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </symbol>

  <symbol id="icon-external" viewBox="0 0 24 24">
    <g fill="none" stroke="var(--text-faint)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M7 7h10v10"/>
      <path d="M7 17 17 7"/>
    </g>
  </symbol>

  <!-- 24×24 fixed-color icon -->
  <symbol id="icon-play" viewBox="0 0 24 24">
    <path d="M8 5v14l11-7z" fill="#fff"/>
  </symbol>

</svg>
