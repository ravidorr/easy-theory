<!-- @dsCard group="Screens" viewport="420x900" subtitle="חזרה על תמרורים, ידעתי / עוד לא" name="Flashcards · כרטיסיות" -->
<!DOCTYPE html>
<html lang="he" dir="rtl"><head><meta charset="utf-8"><title>ClearRoad – Flashcards</title><link rel="stylesheet" href="../../styles.css"><link rel="stylesheet" href="flashcards.css"></head>
<body>

  <!-- Top bar -->
  <div class="top-bar">
    <button class="btn-icon">→</button>
    <div class="top-bar-text">
      <span class="top-bar-title">תמרורים: חזרה</span>
      <span class="top-bar-counter">כרטיס 4 מתוך 12</span>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-bar">
    <div class="progress-fill"></div>
  </div>

  <!-- Flashcard (front) -->
  <div class="flashcard-stage">
    <div class="flashcard">
      <img src="../../assets/signs/sign-302-stop.png" alt="תמרור עצור">
      <span class="flip-hint">הקליקי להיפוך</span>
    </div>
  </div>

  <!-- Know / don't know -->
  <div class="flashcard-actions">
    <button class="btn-secondary">עוד לא</button>
    <button class="btn-primary">ידעתי ✓</button>
  </div>
  <span class="flashcard-hint">כרטיסים שסימנת "עוד לא" יחזרו אלייך מחר.</span>

</body></html>
