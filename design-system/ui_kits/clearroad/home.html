<!-- @dsCard group="Screens" viewport="420x900" subtitle="המשימה להיום, מסלול, נושאים" name="Home · המשימה להיום" -->
<!DOCTYPE html>
<html lang="he" dir="rtl"><head><meta charset="utf-8"><title>ClearRoad – Home</title><link rel="stylesheet" href="../../styles.css"><link rel="stylesheet" href="home.css"></head>
<body>

  <!-- Top bar: wordmark + gamification pills -->
  <div class="top-bar">
    <span class="wordmark">דרך ברורה</span>
    <div class="pill-group">
      <span class="pill pill--streak">
        <svg width="15" height="15" aria-hidden="true"><use href="../../icons.svg#icon-flame"/></svg>
        5
      </span>
      <span class="pill pill--points">
        <svg width="15" height="15" aria-hidden="true"><use href="../../icons.svg#icon-star"/></svg>
        240
      </span>
    </div>
  </div>

  <!-- Greeting -->
  <div class="greeting">
    <h1>בוקר טוב, נועה!</h1>
    <span class="greeting-sub">5 ימים ברצף, קצב טוב.</span>
  </div>

  <!-- Today's task card -->
  <div class="card">
    <span class="badge">המשימה להיום</span>
    <div class="task-info">
      <h2>זכות קדימה, חלק 2</h2>
      <span class="task-sub">8 שאלות תרגול · ~20 דק׳</span>
    </div>
    <!-- Path progress: step 3 of 5 -->
    <div class="path-steps">
      <span class="path-step path-step--done">✓</span>
      <span class="path-line path-line--done"></span>
      <span class="path-step path-step--done">✓</span>
      <span class="path-line path-line--done"></span>
      <span class="path-step path-step--current">3</span>
      <span class="path-line path-line--future"></span>
      <span class="path-step path-step--future">4</span>
      <span class="path-line path-line--future"></span>
      <span class="path-step path-step--future">🏁</span>
    </div>
    <button>יאללה, לעבודה!</button>
  </div>

  <!-- Topics -->
  <div class="section">
    <div class="section-header">
      <h2>הנושאים שלך</h2>
      <span class="section-count">3 מתוך 12</span>
    </div>

    <div class="topic-card">
      <div class="topic-icon">
        <img src="../../assets/signs/sign-303-roundabout.png" alt="">
      </div>
      <div class="topic-body">
        <div class="topic-row">
          <span class="topic-name">תמרורי הוריה</span>
          <span class="topic-pct">80%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill progress-fill--80"></div>
        </div>
      </div>
    </div>

    <div class="topic-card">
      <div class="topic-icon">
        <img src="../../assets/signs/sign-301-yield.png" alt="">
      </div>
      <div class="topic-body">
        <div class="topic-row">
          <span class="topic-name">זכות קדימה</span>
          <span class="topic-pct">45%</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill progress-fill--45"></div>
        </div>
      </div>
    </div>

    <div class="topic-card">
      <div class="topic-icon">
        <img src="../../assets/signs/sign-no-parking.png" alt="">
      </div>
      <div class="topic-body">
        <div class="topic-row">
          <span class="topic-name">חנייה ועצירה</span>
          <span class="topic-pct topic-pct--done">✓ הושלם</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill progress-fill--success progress-fill--100"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Tab bar: הבית active -->
  <nav>
    <a href="home.html" class="nav-active">
      <svg width="22" height="22" aria-hidden="true"><use href="../../icons.svg#icon-home"/></svg>
      <span>הבית</span>
    </a>
    <a href="#">
      <svg width="22" height="22" aria-hidden="true"><use href="../../icons.svg#icon-book"/></svg>
      <span>נושאים</span>
    </a>
    <a href="flashcards.html">
      <svg width="22" height="22" aria-hidden="true"><use href="../../icons.svg#icon-cards"/></svg>
      <span>כרטיסיות</span>
    </a>
    <a href="more.html">
      <svg width="22" height="22" aria-hidden="true"><use href="../../icons.svg#icon-more"/></svg>
      <span>עוד</span>
    </a>
  </nav>

</body></html>
