<!-- @dsCard group="Screens" viewport="420x900" subtitle="כניסה עם קישור במייל, בלי סיסמה" name="Login · כניסה" -->
<!DOCTYPE html>
<html lang="he" dir="rtl"><head><meta charset="utf-8"><title>ClearRoad – Login</title><link rel="stylesheet" href="../../styles.css"><link rel="stylesheet" href="login.css"></head>
<body>

  <!-- Centered login card -->
  <div class="login-content">

    <!-- Wordmark + welcome -->
    <div class="login-header">
      <span class="wordmark">דרך ברורה</span>
      <div class="login-title-group">
        <h1>טוב שבאת!</h1>
        <span class="login-subtitle">מתחברות עם קישור למייל, בלי סיסמה.</span>
      </div>
    </div>

    <!-- Email form card -->
    <div class="login-card">
      <label>
        <span class="label-hint">כתובת המייל שלך</span>
        <input type="email" placeholder="noa@example.com" dir="ltr">
      </label>
      <button>שלחי לי קישור</button>
    </div>

    <!-- Sent state (shown after submit; hidden by default in app) -->
    <div class="login-sent">
      <span class="sent-icon">✓</span>
      <div class="sent-body">
        <span class="sent-title">הקישור בדרך אלייך</span>
        <span class="sent-hint">בדקי את המייל ולחצי על הקישור כדי להיכנס.</span>
      </div>
    </div>

  </div>

  <span class="login-footer">ClearRoad</span>

</body></html>
