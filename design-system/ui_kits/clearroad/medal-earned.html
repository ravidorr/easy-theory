<!DOCTYPE html>
<html lang="he" dir="rtl"><head><meta charset="utf-8"><title>ClearRoad – Medal Earned</title><link rel="stylesheet" href="../../styles.css"><link rel="stylesheet" href="medal-earned.css">
</head>
<body>

  <!-- Quiz summary behind the modal (dimmed context) -->
  <div class="top-bar">
    <button class="btn-icon">✕</button>
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
    <span class="progress-counter">8 מתוך 8</span>
  </div>

  <div class="summary-card">
    <span class="summary-score">7 מתוך 8</span>
    <span class="summary-desc">יפה מאוד! זכות קדימה כבר יושבת לך טוב.</span>
    <span class="points-badge">
      <svg width="15" height="15" aria-hidden="true"><use href="../../icons.svg#icon-star"/></svg>
      +280
    </span>
  </div>

  <!-- Celebration modal -->
  <div class="modal-overlay">
    <div role="dialog" aria-modal="true" aria-label="מדליה חדשה" class="modal-dialog">
      <div class="medal-visual">
        <div class="medal-icon">
          <svg width="32" height="32" aria-hidden="true"><use href="../../icons.svg#icon-flame-gold"/></svg>
        </div>
        <span class="medal-subtitle">5 ימים ברצף</span>
      </div>
      <div class="modal-text">
        <h2>מדליה חדשה! 🎉</h2>
        <span class="modal-desc">חמישה ימים של למידה ברצף, כל הכבוד!</span>
      </div>
      <button>מעולה, ממשיכות!</button>
    </div>
  </div>

</body></html>
