<!-- @dsCard group="Screens" viewport="420x900" subtitle="מודל חגיגה כשמרוויחים מדליה" name="Medal Earned · מדליה חדשה" -->
<!DOCTYPE html>
<html lang="he" dir="rtl"><head><meta charset="utf-8"><title>ClearRoad – Medal Earned</title><link rel="stylesheet" href="../../styles.css">
<style>
@keyframes medal-pop { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
</style>
</head>
<body style="background:var(--bg); margin:0; padding:20px; display:flex; flex-direction:column; gap:20px; max-width:420px; box-sizing:border-box; min-height:100vh;">

  <!-- Quiz summary behind the modal (dimmed context) -->
  <div style="display:flex; align-items:center; gap:14px;">
    <button style="width:44px; height:44px; border-radius:50%; border:1px solid var(--border-strong); background:var(--surface); color:var(--text-muted); font-size:18px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; font-family:var(--font-ui);">✕</button>
    <div style="flex:1; height:8px; border-radius:var(--radius-pill); background:var(--surface-2); overflow:hidden;">
      <div style="width:100%; height:100%; border-radius:var(--radius-pill); background:var(--primary);"></div>
    </div>
    <span style="font-size:var(--type-caption-size); font-weight:var(--type-caption-weight); color:var(--text-faint); flex-shrink:0;">8 מתוך 8</span>
  </div>

  <div style="background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-xl); box-shadow:var(--shadow-card); padding:24px 20px; display:flex; flex-direction:column; align-items:center; gap:8px; text-align:center;">
    <span style="font-size:var(--type-h1-size); font-weight:var(--type-h1-weight); color:var(--text);">7 מתוך 8</span>
    <span style="font-size:var(--type-small-size); color:var(--text-muted);">יפה מאוד! זכות קדימה כבר יושבת לך טוב.</span>
    <span style="display:inline-flex; align-items:center; gap:6px; background:var(--gold-soft); color:var(--gold-text); border-radius:var(--radius-pill); padding:6px 14px; font-weight:700; font-size:14px; margin-top:6px;">
      <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 1.2l2 4.2 4.6.6-3.4 3.2.9 4.6L8 11.6l-4.1 2.2.9-4.6L1.4 6l4.6-.6z"/></svg>
      +280
    </span>
  </div>

  <!-- Celebration modal -->
  <div style="position:fixed; inset:0; z-index:100; background:rgba(24,32,60,0.45); display:flex; align-items:center; justify-content:center; padding:24px;">
    <div role="dialog" aria-modal="true" aria-label="מדליה חדשה" style="background:var(--surface); border-radius:var(--radius-2xl); box-shadow:var(--shadow-pop); padding:32px 28px 24px; width:100%; max-width:320px; box-sizing:border-box; display:flex; flex-direction:column; align-items:center; gap:16px; text-align:center; animation:medal-pop var(--dur-med) var(--ease-spring);">
      <div style="display:inline-flex; flex-direction:column; align-items:center; gap:8px;">
        <div style="width:76px; height:76px; border-radius:50%; background:var(--gold-soft); color:var(--gold-text); border:3px solid var(--gold); display:flex; align-items:center; justify-content:center; box-shadow:var(--shadow-card);">
          <svg width="32" height="32" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 1.5c.4 2.2 3.1 3.4 3.9 5.8.9 2.7-.8 6-3.9 6s-4.8-3.3-3.9-6c.4-1.3 1.4-2.2 2.2-3.2.8-1 1.5-1.7 1.7-2.6z"/><circle cx="8" cy="10.6" r="2.1" fill="var(--gold-soft)" opacity="0.85"/></svg>
        </div>
        <span style="font-size:var(--type-caption-size); font-weight:600; color:var(--gold-text);">5 ימים ברצף</span>
      </div>
      <div style="display:flex; flex-direction:column; gap:4px;">
        <h2 style="margin:0; font-size:var(--type-h2-size); font-weight:var(--type-h2-weight); color:var(--text);">מדליה חדשה! 🎉</h2>
        <span style="font-size:var(--type-small-size); color:var(--text-muted); line-height:var(--line-body);">חמישה ימים של למידה ברצף, כל הכבוד!</span>
      </div>
      <button style="font-family:var(--font-ui); font-weight:700; font-size:15.5px; min-height:var(--hit-min); padding:10px 22px; width:100%; border-radius:var(--radius-lg); border:1px solid transparent; cursor:pointer; background:var(--primary); color:var(--text-on-primary); box-shadow:var(--shadow-press);">מעולה, ממשיכות!</button>
    </div>
  </div>

</body></html>
