<!-- @dsCard group="Screens" viewport="420x900" subtitle="תוכנית, סרטונים, חומרים, מצב כהה" name="More · עוד" -->
<!DOCTYPE html>
<html lang="he" dir="rtl"><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css"></head>
<body style="background:var(--bg); margin:0; padding:20px 20px 96px; display:flex; flex-direction:column; gap:20px; max-width:420px; box-sizing:border-box; min-height:100vh;">

  <!-- Header -->
  <h1 style="margin:0; font-size:var(--type-h1-size); font-weight:var(--type-h1-weight); line-height:var(--line-tight); color:var(--text);">עוד</h1>

  <!-- Navigation rows -->
  <div style="background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-xl); box-shadow:var(--shadow-card); display:flex; flex-direction:column; overflow:hidden;">

    <a href="schedule.html" style="text-decoration:none; display:flex; align-items:center; gap:14px; padding:16px; min-height:var(--hit-min); box-sizing:border-box; border-bottom:1px solid var(--border);">
      <span style="width:40px; height:40px; border-radius:var(--radius-md); background:var(--primary-soft); color:var(--primary-soft-text); display:inline-flex; align-items:center; justify-content:center; flex-shrink:0;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="17" rx="3"/><path d="M8 2v4M16 2v4M3 9h18"/></svg>
      </span>
      <span style="flex:1; font-size:var(--type-body-size); font-weight:600; color:var(--text);">התוכנית שלך</span>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-faint)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><path d="m15 18-6-6 6-6"/></svg>
    </a>

    <a href="videos.html" style="text-decoration:none; display:flex; align-items:center; gap:14px; padding:16px; min-height:var(--hit-min); box-sizing:border-box; border-bottom:1px solid var(--border);">
      <span style="width:40px; height:40px; border-radius:var(--radius-md); background:var(--primary-soft); color:var(--primary-soft-text); display:inline-flex; align-items:center; justify-content:center; flex-shrink:0;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="3"/><path d="m14 12-4-2.5v5z" fill="currentColor" stroke="none"/></svg>
      </span>
      <span style="flex:1; font-size:var(--type-body-size); font-weight:600; color:var(--text);">סרטוני לימוד</span>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-faint)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><path d="m15 18-6-6 6-6"/></svg>
    </a>

    <a href="resources.html" style="text-decoration:none; display:flex; align-items:center; gap:14px; padding:16px; min-height:var(--hit-min); box-sizing:border-box;">
      <span style="width:40px; height:40px; border-radius:var(--radius-md); background:var(--primary-soft); color:var(--primary-soft-text); display:inline-flex; align-items:center; justify-content:center; flex-shrink:0;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.5.5l3-3a5 5 0 0 0-7-7l-1.7 1.7"/><path d="M14 11a5 5 0 0 0-7.5-.5l-3 3a5 5 0 0 0 7 7l1.7-1.7"/></svg>
      </span>
      <span style="flex:1; font-size:var(--type-body-size); font-weight:600; color:var(--text);">חומרים שימושיים</span>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-faint)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><path d="m15 18-6-6 6-6"/></svg>
    </a>
  </div>

  <!-- Settings -->
  <div style="background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-xl); box-shadow:var(--shadow-card); display:flex; flex-direction:column; overflow:hidden;">
    <label style="display:flex; align-items:center; gap:14px; padding:16px; min-height:var(--hit-min); box-sizing:border-box; cursor:pointer;">
      <span style="width:40px; height:40px; border-radius:var(--radius-md); background:var(--surface-2); color:var(--text-muted); display:inline-flex; align-items:center; justify-content:center; flex-shrink:0;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
      </span>
      <span style="flex:1; font-size:var(--type-body-size); font-weight:600; color:var(--text);">מצב כהה</span>
      <span role="switch" aria-checked="false" style="width:46px; height:28px; border-radius:var(--radius-pill); position:relative; background:var(--surface-3); flex-shrink:0; display:inline-block;">
        <span style="position:absolute; top:3px; inset-inline-start:3px; width:22px; height:22px; border-radius:50%; background:#fff; box-shadow:0 1px 3px rgba(24,32,60,0.25);"></span>
      </span>
    </label>
  </div>

  <button style="font-family:var(--font-ui); font-weight:700; font-size:15.5px; min-height:var(--hit-min); padding:10px 22px; border-radius:var(--radius-lg); border:none; cursor:pointer; background:transparent; color:var(--danger-text); align-self:center;">יציאה מהחשבון</button>

  <!-- Tab bar: עוד active -->
  <nav style="position:fixed; bottom:0; inset-inline-start:0; width:100%; max-width:420px; box-sizing:border-box; background:var(--surface); border-top:1px solid var(--border); display:flex; padding:6px 8px calc(6px + env(safe-area-inset-bottom));">
    <a href="home.html" style="flex:1; min-height:var(--hit-min); text-decoration:none; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; color:var(--text-faint);">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
      <span style="font-size:var(--type-caption-size); font-weight:600;">הבית</span>
    </a>
    <a href="#" style="flex:1; min-height:var(--hit-min); text-decoration:none; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; color:var(--text-faint);">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20V3H6.5A2.5 2.5 0 0 0 4 5.5z"/></svg>
      <span style="font-size:var(--type-caption-size); font-weight:600;">נושאים</span>
    </a>
    <a href="flashcards.html" style="flex:1; min-height:var(--hit-min); text-decoration:none; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; color:var(--text-faint);">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="8" width="12" height="12" rx="2"/><path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"/></svg>
      <span style="font-size:var(--type-caption-size); font-weight:600;">כרטיסיות</span>
    </a>
    <a href="more.html" style="flex:1; min-height:var(--hit-min); text-decoration:none; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; color:var(--primary-soft-text);">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/></svg>
      <span style="font-size:var(--type-caption-size); font-weight:700;">עוד</span>
    </a>
  </nav>

</body></html>
