<!-- @dsCard group="Screens" viewport="420x900" subtitle="שאלת תרגול, מצב תשובה נכונה" name="Quiz · תרגול" -->
<!DOCTYPE html>
<html lang="he" dir="rtl"><head><meta charset="utf-8"><title>ClearRoad – Quiz</title><link rel="stylesheet" href="../../styles.css"></head>
<body style="background:var(--bg); margin:0; padding:20px; display:flex; flex-direction:column; gap:20px; max-width:420px; box-sizing:border-box; min-height:100vh;">

  <!-- Top bar: close + progress -->
  <div style="display:flex; align-items:center; gap:14px;">
    <button style="width:44px; height:44px; border-radius:50%; border:1px solid var(--border-strong); background:var(--surface); color:var(--text-muted); font-size:18px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; font-family:var(--font-ui);">✕</button>
    <div style="flex:1; height:8px; border-radius:var(--radius-pill); background:var(--surface-2); overflow:hidden;">
      <div style="width:37.5%; height:100%; border-radius:var(--radius-pill); background:var(--primary);"></div>
    </div>
    <span style="font-size:var(--type-caption-size); font-weight:var(--type-caption-weight); color:var(--text-faint); flex-shrink:0;">3 מתוך 8</span>
  </div>

  <!-- Question -->
  <div style="display:flex; flex-direction:column; gap:16px; align-items:center;">
    <div style="width:140px; height:140px; border-radius:var(--radius-xl); background:var(--surface); border:1px solid var(--border); box-shadow:var(--shadow-card); display:flex; align-items:center; justify-content:center;">
      <img src="../../assets/signs/sign-303-roundabout.png" alt="תמרור מעגל תנועה" style="width:96px; height:96px; object-fit:contain;">
    </div>
    <h2 style="margin:0; font-size:var(--type-h2-size); font-weight:var(--type-h2-weight); line-height:var(--line-tight); color:var(--text); text-align:center;">מה עלייך לעשות בהתקרבך לתמרור הזה?</h2>
  </div>

  <!-- Options -->
  <div style="display:flex; flex-direction:column; gap:10px;">
    <div style="border-radius:var(--radius-lg); padding:12px 14px; display:flex; align-items:center; gap:12px; border:1.5px solid var(--border-strong); background:var(--surface); min-height:var(--hit-min); box-sizing:border-box;">
      <span style="width:28px; height:28px; border-radius:50%; flex-shrink:0; display:inline-flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; background:var(--surface-2); color:var(--text-muted);">א</span>
      <span style="font-size:var(--type-body-size); line-height:var(--line-body); color:var(--text);">לעצור עצירה מוחלטת לפני המעגל</span>
    </div>

    <div style="border-radius:var(--radius-lg); padding:12px 14px; display:flex; flex-direction:column; gap:8px; border:1.5px solid var(--success); background:var(--success-soft); box-sizing:border-box;">
      <div style="display:flex; align-items:center; gap:12px;">
        <span style="width:28px; height:28px; border-radius:50%; flex-shrink:0; display:inline-flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; background:var(--success); color:#fff;">✓</span>
        <span style="font-size:var(--type-body-size); line-height:var(--line-body); color:var(--text);">להאט ולתת זכות קדימה לרכב שנמצא בתוך המעגל</span>
      </div>
      <div style="font-size:var(--type-small-size); color:var(--text-muted); line-height:var(--line-body); padding-inline-start:40px;">מי שבתוך המעגל תמיד קודם. עוצרות רק אם צריך.</div>
    </div>

    <div style="border-radius:var(--radius-lg); padding:12px 14px; display:flex; align-items:center; gap:12px; border:1.5px solid var(--border-strong); background:var(--surface); min-height:var(--hit-min); box-sizing:border-box;">
      <span style="width:28px; height:28px; border-radius:50%; flex-shrink:0; display:inline-flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; background:var(--surface-2); color:var(--text-muted);">ג</span>
      <span style="font-size:var(--type-body-size); line-height:var(--line-body); color:var(--text);">להמשיך בנסיעה רגילה, לרכב הנכנס יש עדיפות</span>
    </div>

    <div style="border-radius:var(--radius-lg); padding:12px 14px; display:flex; align-items:center; gap:12px; border:1.5px solid var(--border-strong); background:var(--surface); min-height:var(--hit-min); box-sizing:border-box;">
      <span style="width:28px; height:28px; border-radius:50%; flex-shrink:0; display:inline-flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; background:var(--surface-2); color:var(--text-muted);">ד</span>
      <span style="font-size:var(--type-body-size); line-height:var(--line-body); color:var(--text);">לאותת שמאלה לפני הכניסה למעגל</span>
    </div>
  </div>

  <!-- Footer: reward + next -->
  <div style="margin-top:auto; display:flex; flex-direction:column; gap:14px;">
    <div style="display:flex; align-items:center; justify-content:center; gap:8px;">
      <span style="display:inline-flex; align-items:center; gap:6px; background:var(--gold-soft); color:var(--gold-text); border-radius:var(--radius-sm); padding:3px 9px; font-weight:700; font-size:12.5px;">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 1.2l2 4.2 4.6.6-3.4 3.2.9 4.6L8 11.6l-4.1 2.2.9-4.6L1.4 6l4.6-.6z"/></svg>
        +40
      </span>
      <span style="font-size:var(--type-small-size); color:var(--text-muted);">יפה מאוד!</span>
    </div>
    <button style="font-family:var(--font-ui); font-weight:700; font-size:17px; min-height:52px; padding:14px 28px; border-radius:var(--radius-lg); border:1px solid transparent; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; width:100%; background:var(--primary); color:var(--text-on-primary); box-shadow:var(--shadow-press);">לשאלה הבאה</button>
  </div>

</body></html>
