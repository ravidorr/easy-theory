<!-- @dsCard group="Screens" viewport="420x900" subtitle="שאלת תרגול, מצב תשובה נכונה" name="Quiz · תרגול" -->
<!DOCTYPE html>
<html lang="he" dir="rtl"><head><meta charset="utf-8"><title>ClearRoad – Quiz</title><link rel="stylesheet" href="../../styles.css"><link rel="stylesheet" href="quiz.css"></head>
<body>

  <!-- Top bar: close + progress -->
  <div class="top-bar">
    <button class="btn-icon">✕</button>
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
    <span class="progress-counter">3 מתוך 8</span>
  </div>

  <!-- Question -->
  <div class="question">
    <div class="question-image">
      <img src="../../assets/signs/sign-303-roundabout.png" alt="תמרור מעגל תנועה">
    </div>
    <h2>מה עלייך לעשות בהתקרבך לתמרור הזה?</h2>
  </div>

  <!-- Options -->
  <div class="options">
    <div class="option option--default">
      <span class="option-letter option-letter--default">א</span>
      <span class="option-text">לעצור עצירה מוחלטת לפני המעגל</span>
    </div>

    <div class="option option--correct">
      <div class="option-row">
        <span class="option-letter option-letter--correct">✓</span>
        <span class="option-text">להאט ולתת זכות קדימה לרכב שנמצא בתוך המעגל</span>
      </div>
      <div class="option-explanation">מי שבתוך המעגל תמיד קודם. עוצרות רק אם צריך.</div>
    </div>

    <div class="option option--default">
      <span class="option-letter option-letter--default">ג</span>
      <span class="option-text">להמשיך בנסיעה רגילה, לרכב הנכנס יש עדיפות</span>
    </div>

    <div class="option option--default">
      <span class="option-letter option-letter--default">ד</span>
      <span class="option-text">לאותת שמאלה לפני הכניסה למעגל</span>
    </div>
  </div>

  <!-- Footer: reward + next -->
  <div class="quiz-footer">
    <div class="reward-row">
      <span class="reward-badge">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8 1.2l2 4.2 4.6.6-3.4 3.2.9 4.6L8 11.6l-4.1 2.2.9-4.6L1.4 6l4.6-.6z"/></svg>
        +40
      </span>
      <span class="reward-label">יפה מאוד!</span>
    </div>
    <button class="btn-cta">לשאלה הבאה</button>
  </div>

</body></html>
