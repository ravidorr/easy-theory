<!DOCTYPE html>
<html lang="he" dir="rtl"><head><meta charset="utf-8"><title>ClearRoad – Schedule Setup</title><link rel="stylesheet" href="../../styles.css"><link rel="stylesheet" href="schedule-setup.css"></head>
<body>

  <!-- Header -->
  <div class="page-header">
    <h1>מתי נוח לך ללמוד?</h1>
    <span class="page-subtitle">בוחרות ימים ושעה, ואפשר לשנות מתי שרוצים.</span>
  </div>

  <!-- Day picker -->
  <div class="card">
    <span class="card-label">באילו ימים?</span>
    <div class="day-picker">
      <button class="btn-day btn-day--active">א</button>
      <button class="btn-day btn-day--inactive">ב</button>
      <button class="btn-day btn-day--active">ג</button>
      <button class="btn-day btn-day--inactive">ד</button>
      <button class="btn-day btn-day--active">ה</button>
      <button class="btn-day btn-day--inactive">ו</button>
      <button class="btn-day btn-day--inactive">ש</button>
    </div>
    <span class="day-count">נבחרו 3 ימים</span>
  </div>

  <!-- Time + duration -->
  <div class="card card--time">
    <label>
      <span class="label-hint">באיזו שעה?</span>
      <input type="time" value="17:00">
    </label>
    <div class="duration-group">
      <span class="label-hint">כמה זמן בכל פעם?</span>
      <div class="duration-buttons">
        <button class="btn-duration btn-duration--inactive">30 דק׳</button>
        <button class="btn-duration btn-duration--active">45 דק׳</button>
        <button class="btn-duration btn-duration--inactive">60 דק׳</button>
      </div>
    </div>
    <label class="label-toggle">
      <span role="switch" aria-checked="true" class="toggle">
        <span class="toggle-thumb"></span>
      </span>
      <span class="toggle-text">תזכורת עדינה לפני כל מפגש</span>
    </label>
  </div>

  <!-- Summary + save -->
  <div class="form-footer">
    <div class="schedule-summary">
      <span class="summary-title">3 מפגשים בשבוע, 45 דק׳ כל אחד</span>
      <span class="summary-sub">קצב נעים שמספיק בדיוק לחומר.</span>
    </div>
    <button class="btn-save">שמרי את התוכנית</button>
  </div>

</body></html>
